# Link checker configuration for detecting URL rot in rustdoc comments.
# Used by check.fish --full (scoped to git-modified files).
#
# Categories of lychee findings:
#   Real 404s     → Fix the URL (find new location), do NOT add to exclude list
#   file:// URIs  → Example/intra-doc paths in docs, excluded below
#   Test URLs     → Fixture URLs in test code, excluded below
#   429 Rate limit → Accepted as non-error below
#   Redirects     → Informational only (docs.rs short URLs always 302)

# Accept rate-limit responses as non-errors.
accept = ["100..=103", "200..=299", "429"]

# Timeout per request (seconds).
timeout = 20

# Max retries per URL (default 3). Lower to reduce total wall-clock time.
max_retries = 1

# Max concurrent requests (avoid rate limiting).
max_concurrency = 8

# Exclude URLs that are intentionally non-resolvable.
exclude = [
    # Example file:// URIs and rustdoc intra-doc link syntax (mod@, field@, fn@, struct@).
    "^file://",
    # Test fixture URLs in test code (not meant to resolve).
    "^https?://test\\.com",
    "^https?://link1\\.com",
    # Placeholder images in markdown parser conformance test data.
    "^https?://via\\.placeholder\\.com/",
    # YouTube blocks automated link checkers (returns 404 to bots).
    "^https?://(www\\.)?youtu(\\.be|be\\.com)/",
    # GitHub API template URLs with {placeholders} that lychee URL-encodes to %7B...%7D.
    "api\\.github\\.com/repos/.*%7B",
    # crates.io API template URLs with {placeholders}.
    "crates\\.io/api/.*%7B",
    # Claude.ai blocks scrapers.
    "^https?://claude\\.ai/",
    # Star-history often has transient 503s or blocks scrapers.
    "^https?://api\\.star-history\\.com/",
    # Medium blocks scrapers.
    "^https?://medium\\.com/",
]
